<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Интерактивная Вселенная</title>
    <style>
        /* Сброс стилей, чтобы заливка была на весь экран */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', sans-serif;
        }
        /* Информационная подпись */
        .info {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="info">Перемещайте курсор — частицы следуют за вами</div>

    <!-- Подключаем библиотеку Three.js с CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. Настройка сцены, камеры и рендерера ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Ограничим для производительности
        document.body.appendChild(renderer.domElement);

        // --- 2. Создаем геометрию для 1500 частиц ---
        const particlesCount = 1500;
        const positions = new Float32Array(particlesCount * 3);
        const colors = new Float32Array(particlesCount * 3);

        const color = new THREE.Color();

        for (let i = 0; i < particlesCount; i++) {
            // Позиции: сфера с радиусом 7
            const radius = 7;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);

            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);

            // Цвета: случайные оттенки синего, фиолетового и розового
            const hue = 0.6 + Math.random() * 0.4; // От синего к розовому
            const saturation = 0.9;
            const lightness = 0.5 + Math.random() * 0.4;
            color.setHSL(hue, saturation, lightness);

            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // --- 3. Материал для частиц (текстура в виде круга) ---
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.5, 'rgba(255,255,255,0.8)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 32, 32);

        const particleTexture = new THREE.CanvasTexture(canvas);

        const material = new THREE.PointsMaterial({
            size: 0.25,
            map: particleTexture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
        });

        // --- 4. Создаем объект частиц и добавляем в сцену ---
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- 5. Добавим несколько звезд на заднем плане для глубины ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i+1] = (Math.random() - 0.5) * 200;
            starPositions[i+2] = (Math.random() - 0.5) * 200 - 30; // Размещаем дальше
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.15,
            transparent: true,
            opacity: 0.4,
        });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- 6. Переменные для отслеживания мыши ---
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;

        document.addEventListener('mousemove', (event) => {
            // Нормализуем координаты от -1 до 1
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;

            // Целевые углы поворота (максимум 0.5 радиан)
            targetRotationX = mouseY * 0.5;
            targetRotationY = mouseX * 0.5;
        });

        // --- 7. Адаптация под размер экрана ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 8. Анимация ---
        function animate() {
            requestAnimationFrame(animate);

            // Плавное следование за мышью (интерполяция)
            particles.rotation.x += (targetRotationX - particles.rotation.x) * 0.05;
            particles.rotation.y += (targetRotationY - particles.rotation.y) * 0.05;

            // Медленное вращение звезд для эффекта глубины
            stars.rotation.y += 0.0002;

            renderer.render(scene, camera);
        }

        animate();

        // Небольшой бонус: если пользователь коснется экрана на телефоне
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length) {
                mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
                targetRotationX = mouseY * 0.5;
                targetRotationY = mouseX * 0.5;
            }
        }, { passive: true });

    </script>
</body>
</html>
